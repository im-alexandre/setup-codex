services:
  ollama-gpu:
    image: ollama/ollama@sha256:3ca37ec2b9cb6341b62554074205c616778fe98abcf9e4fc50361b79a07407ae
    container_name: ollama-gpu
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      # Perfil conservador para embeddings locais.
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_MAX_QUEUE: "512"
      OLLAMA_KEEP_ALIVE: "10m"
      # OLLAMA_GPU_OVERHEAD: "1073741824" # 1 GiB
      OLLAMA_GPU_OVERHEAD: "1342177280" # 1.25 GiB
      # OLLAMA_GPU_OVERHEAD: "1610612736" # 1.5 GiB
      # OLLAMA_GPU_OVERHEAD: "1879048192" # 1.75 GiB
      # OLLAMA_GPU_OVERHEAD: "2147483648" # 2 GiB

    volumes:
      - type: bind
        source: D:\ollama\models
        target: /root/.ollama/models
    cpus: 2.0
    mem_limit: 24g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-cpu:
    profiles: ["cpu"]
    image: ollama/ollama@sha256:3ca37ec2b9cb6341b62554074205c616778fe98abcf9e4fc50361b79a07407ae
    container_name: ollama-cpu
    ports:
      - "11435:11434"
    volumes:
      - type: bind
        source: D:\ollama\models
        target: /root/.ollama/models
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_MAX_QUEUE: "512"
      OLLAMA_KEEP_ALIVE: "10m"
      CUDA_VISIBLE_DEVICES: "-1"
    cpus: 1.0
    mem_limit: 2g
    mem_reservation: 1g
    pids_limit: 256

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    cpus: 1.5
    mem_limit: 2g
    mem_reservation: 512m
    pids_limit: 256

  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_pgvector
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

volumes:
  qdrant_storage:
