model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "medium"
approval_policy = "never"
sandbox_mode = "danger-full-access"
personality = "none"

[features]
js_repl = true
image_generation = true
external_migration = true
prevent_idle_sleep = true
memories = true
codex_hooks = true

[[hooks.StartSession.hooks]]
type = "command"
command = "python C:/Users/imale/.codex/hooks/force_subagent_defaults.py"
timeout = 10
statusMessage = "Forcing subagent defaults"

[[hooks.StartSession.hooks]]
type = "command"
command = "python C:/Users/imale/.codex/hooks/prefer_subagents.py"
timeout = 10
statusMessage = "Applying subagent orchestration policy"

[agents]
max_threads = 10
max_depth = 1

